<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>节拍器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { margin: 20px 0; font-size: 24px; }
    
    /* 摆针 */
    .metronome-box {
      width: 200px;
      height: 220px;
      position: relative;
      margin: 30px 0;
    }
    .pendulum {
      width: 4px;
      height: 160px;
      background: #e94560;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
      border-radius: 2px;
      transition: none;
    }
    .pendulum.center {
      transition: transform 0.05s ease-out;
    }
    .base {
      width: 60px;
      height: 20px;
      background: #16213e;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
      border: 2px solid #0f3460;
    }
    
    /* BPM 显示 */
    .bpm-display {
      font-size: 72px;
      font-weight: bold;
      color: #e94560;
      margin: 20px 0;
    }
    .bpm-label { font-size: 16px; color: #aaa; }
    
    /* 滑块 */
    input[type=range] {
      width: 80%;
      max-width: 300px;
      margin: 20px 0;
      -webkit-appearance: none;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
    }
    
    /* 控制按钮 */
    .controls {
      display: flex;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #e94560;
      color: white;
    }
    .btn-primary:active { transform: scale(0.95); }
    .btn-secondary {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
    }
    
    /* 拍号选择 */
    .time-sig {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }
    .time-sig button {
      padding: 8px 16px;
      font-size: 14px;
    }
    .time-sig button.active {
      background: #e94560;
    }
    
    .beat-dots {
      display: flex;
      gap: 12px;
      margin: 20px 0;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #333;
      transition: all 0.05s;
    }
    .dot.active {
      background: #e94560;
      box-shadow: 0 0 10px #e94560;
      transform: scale(1.3);
    }
    .dot.accent {
      background: #ffd700;
      box-shadow: 0 0 15px #ffd700;
    }
    
    .hint {
      margin-top: 30px;
      color: #666;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🎵 节拍器</h1>
  
  <div class="bpm-display" id="bpmDisplay">120</div>
  <div class="bpm-label">BPM</div>
  
  <input type="range" id="bpmSlider" min="40" max="240" value="120">
  
  <div class="controls">
    <button class="btn-secondary" onclick="adjustBpm(-5)">-5</button>
    <button class="btn-primary" id="playBtn" onclick="toggle()">开始</button>
    <button class="btn-secondary" onclick="adjustBpm(5)">+5</button>
  </div>
  
  <div class="time-sig">
    <button onclick="setBeats(2)" id="beat2">2/4</button>
    <button onclick="setBeats(3)" id="beat3">3/4</button>
    <button onclick="setBeats(4)" id="beat4" class="active">4/4</button>
    <button onclick="setBeats(6)" id="beat6">6/8</button>
  </div>
  
  <div class="beat-dots" id="beatDots"></div>
  
  <div class="metronome-box">
    <div class="pendulum" id="pendulum"></div>
    <div class="base"></div>
  </div>
  
  <div class="hint">
    微信内打开 · 点击"开始"启用音频<br>
    支持后台运行（请勿锁屏）
  </div>

  <script>
    // ========== 音频引擎 ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    
    // 创建节拍声音（用振荡器生成，无需外部文件）
    function createClickSound(accent = false) {
      if (!audioCtx) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      // 第一拍高频，其他拍低频
      osc.frequency.value = accent ? 1000 : 800;
      osc.type = 'sine';
      
      // 短促的包络
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(accent ? 1.0 : 0.6, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      
      osc.start(now);
      osc.stop(now + 0.05);
    }
    
    // ========== 节拍器核心 ==========
    let bpm = 120;
    let beatsPerMeasure = 4;
    let currentBeat = 0;
    let isPlaying = false;
    let nextNoteTime = 0;
    let timerID = null;
    
    // 关键：Web Audio 的调度提前量
    const lookahead = 25; // ms
    const scheduleAheadTime = 0.1; // s
    
    function nextNote() {
      const secondsPerBeat = 60.0 / bpm;
      nextNoteTime += secondsPerBeat;
      currentBeat = (currentBeat + 1) % beatsPerMeasure;
    }
    
    function scheduleNote(beatNumber, time) {
      // 安排音频
      const isAccent = beatNumber === 0;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = isAccent ? 1000 : 800;
      osc.type = 'sine';
      gain.gain.setValueAtTime(isAccent ? 0.8 : 0.5, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
      osc.start(time);
      osc.stop(time + 0.05);
      
      // UI 同步：计算延迟后更新
      const delay = (time - audioCtx.currentTime) * 1000;
      setTimeout(() => {
        updateUI(beatNumber);
        // 震动（微信 H5 支持 navigator.vibrate）
        if (navigator.vibrate) {
          navigator.vibrate(isAccent ? 20 : 10);
        }
      }, Math.max(0, delay));
    }
    
    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
        scheduleNote(currentBeat, nextNoteTime);
        nextNote();
      }
      timerID = setTimeout(scheduler, lookahead);
    }
    
    // ========== UI 更新 ==========
    function updateUI(beatIndex) {
      // 更新指示灯
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === beatIndex);
        d.classList.toggle('accent', i === beatIndex && i === 0);
      });
      
      // 摆针动画
      const pendulum = document.getElementById('pendulum');
      const angle = beatIndex % 2 === 0 ? 25 : -25;
      pendulum.style.transition = 'none';
      pendulum.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      setTimeout(() => {
        pendulum.style.transition = 'transform 0.15s ease-out';
        pendulum.style.transform = `translateX(-50%) rotate(0deg)`;
      }, 50);
    }
    
    function createDots() {
      const container = document.getElementById('beatDots');
      container.innerHTML = '';
      for (let i = 0; i < beatsPerMeasure; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        container.appendChild(dot);
      }
    }
    
    // ========== 控制 ==========
    function toggle() {
      const btn = document.getElementById('playBtn');
      
      if (isPlaying) {
        clearTimeout(timerID);
        isPlaying = false;
        btn.textContent = '开始';
        btn.style.background = '#e94560';
      } else {
        // 微信/移动端：必须用户点击后才能初始化 AudioContext
        if (!audioCtx) {
          audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        currentBeat = 0;
        nextNoteTime = audioCtx.currentTime + 0.05;
        isPlaying = true;
        btn.textContent = '停止';
        btn.style.background = '#666';
        scheduler();
      }
    }
    
    function adjustBpm(delta) {
      bpm = Math.max(40, Math.min(240, bpm + delta));
      updateBpmDisplay();
    }
    
    function updateBpmDisplay() {
      document.getElementById('bpmDisplay').textContent = bpm;
      document.getElementById('bpmSlider').value = bpm;
    }
    
    function setBeats(n) {
      beatsPerMeasure = n;
      currentBeat = 0;
      document.querySelectorAll('.time-sig button').forEach(b => b.classList.remove('active'));
      document.getElementById('beat' + n).classList.add('active');
      createDots();
    }
    
    // 滑块事件
    document.getElementById('bpmSlider').addEventListener('input', (e) => {
      bpm = parseInt(e.target.value);
      updateBpmDisplay();
    });
    
    // 初始化
    createDots();
    
    // 微信/移动端：页面可见性变化时处理
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isPlaying) {
        // 网页锁屏后会暂停 JS，这是网页的限制
        // 如需后台播放，需用小程序或原生 App
      }
    });
  </script>
</body>
</html>
